databases:
  - name: owl-tatame-db
    plan: free
    databaseName: owltatame
    user: owltatame

services:
  - type: web
    name: owl-tatame
    env: node
    plan: free
    buildCommand: cd server && npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build && npx tsx src/seed.ts && cd ../client && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: owl-tatame-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 20.11.0
